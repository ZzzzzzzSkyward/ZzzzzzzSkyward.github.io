const essay={
    title:"Still Another Note of Lolita",
    author:"ZzzzzzzStargezer",
    content:function(){//接下来是段落
        paragraph("记得某年去新华书店，《摆渡人》那时好像很有名。于是看到作者出版的另一本书《黑石之墓》，就一起买来看了。这《黑石之墓》，通篇讲的是一鬼故事，这故事经由幸存者娓娓道来，绘声绘色，可临结尾了突然来一章反转，整个故事是一个彻头彻尾的谎言。这时再联系前言，就恍然大悟，原来作者之意不在于写故事，而在于反思事实与真实的关系。我虽然没有拍案叫绝，但也觉得蛮发厌的。不料看到<i>Lolita</i>一书后，顿觉相形见绌；不仅如此，这种叙述方式还是纳博科夫对前人加以模仿的呢。是我读书少的缘故，嗯。");
        title("【壹】Dolores:噤口不言的主角");
        paragraph("H.H.谈到去精神病院治疗时他以糊弄心理治疗师为乐。于是我想到，当精神病人与医生面面相觑时，谁能知道哪个是真正的精神病人？那么，当我们面对H.H.的叙述时，便没有人能知道H.H.所展现的，是谎言还是真实。他到底是假装理智的疯子，还是假装疯癫的常人，除了他自己，还有谁能知道呢？当心啊！甚至H.H.自己也直言不讳，说他隐瞒了不宜公开的内容。唯独以这样犀利的目光剖析全文，才能避免落入H.H.设下的陷阱，得以窥见迷宫之外的世界。");
        paragraph("比如，一个值得一提的事实是，在这本书里，H.H.从未让Dolores站出来发声。实际上连Dolores本人的身份也在被不断淡化。她可以是Annabel的后继，也可以是Charlotte的影子；她可以是Carmen，可以是Schiller太太，whatever，H.H.根本不关心。他关心的只是Lolita。他不需要Dolores说话。即使有时听到了Dolores的声音，他也只会心生厌恶。他口口声声说爱她，他可曾爱过Dolores？他真的有看到Dolores吗？或者说，在他眼里Dolores从未比Lolita有着更多意味吗？");
        paragraph("可惜Dolores无法说话。我们看到的是超凡脱俗的Lolita，H.H.让她活蹦乱跳，而Dolores不过是一个无足轻重的小女孩，没有话语权，依附在Lolita之后，挣扎着生存。");
        paragraph("不少人认为Dolores咎由自取，认为她自甘堕落，真是这样吗？文中有这么一段对话，辛酸之味，溢于言表：");
        quote("“Lolita，”我说，“虽说不合时宜，但不得不说，人生真的很短暂。从这里到你再熟悉不过的以前那辆车只有二十，二十五步的距离。这是一段很短的路程。迈出这二十五步。现在。就是现在。就这样过来。我们会永远幸福地生活在一起。”");
        quote("...");
        quote("“你是说，”她抬起头，睁开眼睛，如同一条准备攻击的蛇，“你是说你给我们[我们]那笔钱的前提是我跟你去一家汽车旅馆。你是这个意思吗？”");
        quote("“不，”我说，“你搞错了。我要你离开你偶遇到的Dick，离开这个糟糕的鬼地方。过来和我活在一起，死在一起，什么都在一起。”（大意如此。）");
        quote("“你简直疯了。”她面容抽动着。");
        quote("“好好想想，Lolita，没有附加条件。也许除了——没什么（死缓，我想说没说出口）。不管怎么说，你就算拒绝也能得到你的…嫁妆。”");
        quote("“不是开玩笑？”Dolly问。");
        quote("我递给她一个信封，里面装了四百美元现金，还有一张三千六百块的支票。她小心翼翼，迟疑不决地收下了我的一点心意。她的前额出现了美丽的红晕。“你是说，”她问到，语气痛苦地强调，“你给我们四千？”我掩面而泣。一生中，我从未流过如此滚烫的泪水。现在我感觉到泪流蜿蜒穿过指隙，到下巴滴落，把我灼伤。我鼻子淤塞。我甚至不能自已。她碰了我的手腕。");
        quote("“你再碰我就要死了，”我说，“你确定不跟我走？完全没希望吗？就说这个。”“不。”她说，“不，亲爱的，不。”");
        quote("她从来没叫过我亲爱的。"),
        quote("“不。”她说，“这是不可能的。我宁愿回到Cue身旁。我是说——”");
        quote("她试图措辞，我心里补全了这句话：他伤透了我的心，你只是毁了我的一生而已。[<i>He</i> broke my heart, <i>you</i> merely broke my life.]");
        quote("...");
        quote("为了找点天聊聊，我几乎都要说出口了，“有时候我想知道McCoo家"+alias("")+"的小姑娘现在怎么样了，她过得好些了吗？”，可还是及时停住了，唯恐她回我一句“有时候我想知道Haze家的小姑娘现在怎么样了……”。");
        paragraph("H.H.是教师，是作家，是鳏夫，无论他是谁，在Dolores看来，他是杂志广告上的明星，是新来的老爸，是弑母凶手，是毁了她童年的人，是五足怪兽，是一双眼睛和一英尺的肌肉，最后什么都不是。");
        paragraph("设身处地为她考虑一下，她该如何面对眼前这个人，她该如何面对眼前这个世界？");
        paragraph("她是年幼丧父的Dolores，是失去了弟弟与母亲相依为命的Dolores，是寄人篱下的Dolores，是被夺去童年的Dolores。刚用计谋逃脱H.H.之爪，下一脚便陷入魔窟。并非说她无路可走，她只不过是在最糟和更糟之间作出选择。");
        paragraph("她说：");
        quote("你知道的，关于死亡的事中，最可怕的莫过于那完全由你自己决定。");
        paragraph("她说，");
        quote("是的，这个世界就是一个接一个的笑话，如果有人把她的生平写下来没人会信");
        paragraph("她终究还是要面对他，面对整个世界。");
        quote("她端详着我，似乎突然理解了这个不可思议的事实，或者说又不知何故，单调乏味、令人困惑而且毫无益处的事实。"+
              "坐在她身边的这个人，冷漠、文雅、瘦长，体弱多病，穿着天鹅绒外套，已是不惑之年，这个人曾了解并珍爱过青春期的她身体上每一处毛孔、每一个毛囊。她的灰眼睛已然黯淡失色，还突兀地戴着眼镜。可有那么一刻，我们那段卑微的恋情在她眼中被重映，被深思，随之被一文不名地丢弃，就如同一场索然无趣的派对，一次只有最愚钝无聊的家伙才会参加的雨天野餐，一项千篇一律的训练，抑或是一丁点粘在她童年上的干泥巴。");
        paragraph("她是拼命攒钱想早日逃离H.H.的Dolores，是向熟人求助策划计谋的Dolores，是洁身自好被轰出门外的Dolores，是在城里打工嫁给工人的Dolores。这个Dolores，有点幼稚，有点庸俗，但绝对没有魔力，绝对不是H.H.口中的Lolita。");
        paragraph("从这一意义上来看，H.H.喜爱，追忆，缅怀的，是Lolita；而遭到恐吓，压迫，诱导的，是Dolores。Dolores还没出场，就已在前言里死去。而Lolita永生。");
        title("【贰】Lolita：她是谁？");
        paragraph("要回答这个问题，还得问那个沙滩的男孩。男孩试图寻找女孩的背影，却一无所获。直到Lolita的出现：");
        quote("那一刻，事实上，当Annabel Haze，又名 "+
              footnote("Dolores Lee","在H.H.的记忆中Annabel Leign的印象已经面目模糊，于是乎H.H.记成了爱伦·坡笔下的Annabel Lee")+
              "，又名Loleeta，出现在我面前，全身金黄，皮肤黝黑……");
        paragraph("这里，Lolita看起来好像是Dolores的昵称，而且是H.H.的专属称呼，除了他以外没人知道。然而，当H.H.对坐他腿上看杂志的Dolores意淫时却是另一番言辞：");
        quote("我洋洋自得。我没损害未成年人的品德，却窃取了甘甜的蜜浆。绝对没有任何不良影响。魔术师把牛奶、糖浆和起泡的香槟倒入年轻女士的钱包。瞧，钱包毫发无损。如此，我精心构建了我的梦想，它卑鄙、炽烈、罪恶。与此同时，Lolita仍然安全——我也很安全。我疯魔般占有的并不是她，而是我的创造，是另一个幻想中的Lolita，是或许比Lolita更真实的Lolita——她与她重叠，她把她围裹，她在我她之间飘浮，没有意志，毫无意识，其实她本身空无生命。");
        paragraph("自从他从Dolores身上找到Annabel的身影后，一个奇怪的结合就产生了。真实的Dolores与虚拟的Lolita，H.H.偏偏只看Lolita。这一结合并不是那么稳固的，随着时间推移，nymphet的魔力将会消失，H.H.将面临一个日益扩大的鸿沟。");
        quote("我必须坦白，我的思维可以在一天之内从一极错乱到另一极，全看我腺体和神经的状况。一头是到1950年前后，nymphage的魔力消散，我无论如何得摆脱这个麻烦的少女。另一头是，用一点点耐心加上运气，说不定最后能让她生产出一个nymphet，一个静脉里流淌着我的血液的Lolita二代；她会在1960年前后长到八九岁，彼时我仍值春秋鼎盛之年；实际上，我，不知道带了脑子还是没带脑子，如此高瞻远瞩足以想见一个宝刀未老的长者——或者是面黄肌瘦的老朽？——总之是古怪的、温柔的、垂涎欲滴的Dr.Humbert，对着超级可爱的Lolita三代练习做爷爷的艺术。");
        paragraph("他沉浸在自己的幻想之中，直至最后才幡然醒悟，才真正看清了Dolores的模样。当他回想起埋藏在心底的往事时，他才能感觉到Lolita与Dolores是如此不同，不同得令人眼角发酸。H.H.是可恨呢，还是可怜呢？梦里活了这么久，他从浴室半掩的门里一瞥，才能看到镜中的容颜，真实得触目惊心。");
        quote("那是一种无助的表情，如此完美以至于变成了一种舒适的空虚。只因这正是不公和懊丧的极限——有极限就必然存在超越极限的事物——就产生了素色的光。而当你牢记这是一个孩子挑起的眉毛和张开的嘴唇时，你或许可以更加清楚地知道是怎样精心的算计和深沉的肉欲，以及折射出的绝望阻挠了我，让我不拜倒在她的玉足之下，溶解在人类的泪水中，牺牲我的嫉妒来满足Lolita想获得的乐趣——与门外的世界里肮脏、危险的孩子交往，那里对她来说意味着真实。");
        paragraph("于是H.H.终于想起不堪入目的现实。");
        quote("我突然发现自己在想，我们漫长的旅途好比史莱姆留下的蜿蜒轨迹，除了玷污了这个可爱的、梦幻般的、信任他人的、疆域辽阔的国家之外几乎无迹可寻。回首往事，这场旅途不过是一堆卷角的地图、破烂的旅行手册、废旧的轮胎，还有，夜深人静时她的啜泣——每天晚上，每天晚上——每当我假装睡着时。");
        paragraph("十一二三岁的小姑娘本该无忧无虑。到底是什么让她每天晚上都独自哭泣？");
        quote("Lolita那时正在炉火旁读书，她伸展了下四肢，胳膊肘举起，嘴里咕哝着问：“她埋在哪里？”“谁？”“噢，你知道的，我被谋杀的妈妈。”“那么你知道她的坟墓在哪里的”，我控制着自己，随后说出了墓地的名称。”");
        paragraph("她没能参加妈妈的葬礼，甚至都还不知道墓地的地点。用如此平静的语气提出如此沉重的话题，这对一个小姑娘意味着什么？");
        quote("Lolita的微笑：虽然两靥闪烁着柔嫩而芳馨的光泽，但从不对着屋里的陌生人。打个比方，Lolita的微笑远远地悬浮在它自己花团锦簇的虚空中。或者说，它温柔地游移于眼前的各种物体，随着视线变化而运动。胖Avis"+alias("Avis家来做客的女儿")+"偷偷靠近她爸。几英里外，Lolita靠在桌沿上，手指触摸着水果刀，面朝它温柔地微笑。那时Avis正紧贴住她爸的脖子和耳朵，可突然，Avis爸随手一搂，他那个笨重庞大的孩子就被一把抱在怀里。我看到Lolita的微笑刹那间失去了它全部的光芒，冻结成了它自己的小影子。水果刀滑下桌面，银质刀柄诡异地撞到她的脚踝，吓得她倒吸一口冷气。她低下头，单腿跳起，面色难看，脸上写满了酝酿中的痛苦，那是孩子在泪如雨下之前的征兆。");
        paragraph("“著名的Lolita的微笑”暗示着她怎样的生存境遇？");
        paragraph("H.H.将Lolita投射到Dolores身上，为了满足一己肉欲而置Dolores于厄运。他身登天堂，她坠入地狱。虽然他明知后果，但他依旧选择天堂，万死不辞，终而万劫不复，因为Lolita是他的redemption，失去了Lolita，就失去了天堂。");
        paragraph("他坦承这对Dolores意味着什么：");
        quote("但这整个辩论中最糟糕的一点就是，在我们反常而且堕落的同居生活中，我平凡的Lolita逐渐明白了一点。那就是，即使最悲惨的家庭也好过乱伦。而这，从长期来看，是我所能给予这个无家可归的孤儿最好的东西。");
        paragraph("Lolita是谁？她是H.H.心中的小恶魔，是他的"+
		               footnote("执念","<p>关于这个，<i>The Suicide of Rachel Foster</i>这款游戏中有类似情节，是开旅馆的父亲写给他女儿（妮可）的遗书。此父亲因为爱上了朋友家的女儿（瑞秋），借家教之名行暧昧之实，被妻子发现，致瑞秋被害，瑞秋弟弟（欧文）陪父亲在原旅馆中寻找瑞秋。具体内容可去bilibili 渗透之C君 《瑞秋的自杀惨案》观看。现拈来如下： </p><p>我上次用到这台录音机时，还是不少年前。我想那时你在上小学。构思这份遗嘱时，我本想用沉静的态度开场——“我亲爱的妮可，我钟爱的女儿”，却总是愈发地伤心，沉静、沉重、严肃，总是万劫不复。我更想问问你近来可好。你好吗，Nicky?你很可能累了，我可以想象。我知道这趟旅途中你看到了一切。这家老旧的旅馆里的痕迹和嗓音将会诉说它们所有的秘密。不像我，你擅长解决难题，这一点更像你妈妈。欧文一直都坚信，你，只有你才能穿过这些走廊中渗出的痛苦。我们尝试了我们等待了我们害怕了。我们研究了我们倾听了——我们听到她了。但这世上所有的爱意都不足以辨识出那些哑口之言、那双圆睁的眼和那片泪光。在你的时空中，此时此地，我将不能在陪着你。可这不重要，相信我，这不重要。我有个新理论，Nicky。爱在，恒在。它在你站立的木板上，在撑起这座旅馆的墙上，【妮可：你说的是谁？！】，在我们呼吸的空气中。而有时它会记恨。它恨所有容不得它的人，恨所有冷漠抛弃它的人，恨所有无法看到它的人。星星依旧发光，即便是坍缩之后，是吧？这里有的是光芒。这里有光，也有死亡。我想把自己解脱出这…黑暗。我再也无法看到星星。我厌倦了。我无法再活在这…狱所。那么，你好吗，Nicky？我…很好。我以后…也很好。去听听瑞秋到底说了什么。她就在这里。【钟声突然响起，黑板上写有“凶手”一词】</p>")+
		"，同时也是整部拜占庭建筑式著作的第一个词和最后一个词，是他的Lolita。");
		title("【叁】H.H. :着魔的猎人");
		paragraph("H.H.曲笔挥毫，极尽诡辩之能事，且罗列其下：");
		paragraph("一、特以主观概念剥离受害者群体，为自己开脱");
		quote("现在我想引入以下概念。年龄介乎九与十四之间，确实存在一些少女，她们在某些入魔的旅行者（年龄至少是少女的两倍）眼中，袒露出她们真正的天性——不是人类的，而是nymphic"+alias("恶魔的")+"。而对这些特定的生物，我提议将她们命名为nymphets。");
		paragraph("二、威逼利诱，让人家踏上贼船");
		quote("我亲爱的Dolores！我想保护你，亲爱的，保护你免遭小女孩在煤棚和小巷里的罹受恐惧，还有，唉，我的小宝贝你最清楚了，夏日天空最蓝的时候蓝莓林里的恐惧。哪怕赴汤蹈火，我也要尽监护人之职；我希望法院能尽早确认我的法定监护人身份，如果你听话的话。可是，Dolores Haze，请让我们忘掉所谓的法律术语，那种东西理性到把“色情、淫荡的同居”当作术语。我不是一个不怀好意狎弄儿童、有伤风化的变态。Charlie Holmes才是强奸犯，而我是治疗师——两者之间仅一空之差。我是你的老爸，Lo。瞧，我这里有本关于年轻女孩的专业书籍，瞧，宝贝，上面说了些什么。我引一段：正常的女孩——正常的，你看"+alias("mark you:consider in a particular circumstance，让某人考虑一种情形")+"——正常的女孩通常极度渴望取悦她的父亲。她从父亲身上看到她所希冀的令人费解的男性的前身。...明智的母亲(你可怜的母亲，要是还活着，一定也很明智)会鼓励父女之间的伴侣关系，因为她意识到，女儿在与父亲的接触中会发现她理想的浪漫与理想的爱人形象。...最后，让我们看看，要是你一个未成年人被指控在一家体面的客栈败坏了一个成年人的品行，会发生点什么；要是你报警，控诉我绑架和强奸你，又会发生点什么。假定他们真信了你的话，一名未成年女性在使得二十一岁以上者与之发生性关系后，视技术手段而定，让受害者犯下"+
		footnote("法定强奸罪或二等鸡奸罪",
