<html>
    <head></head>
    <body>
        <style>
            #graph{
                position: absolute;
                left: 10px;
                top:10px;
                display: block;
                overflow: visible;
                width:100%;
                height: 100%;
	            transform-origin: left top;
            }
            .rect{
                position: absolute;
                height:45px;
                background-color:red;
                display: block;
                border-right:0px solid azure;
            }
            .val{
                position: absolute;
                height:50px;
                display: block;
                font-size: 20px;
            }
        </style>
        <div id="graph"></div>
        <script>
            var store=[];
var score=[695];
var sum=[];
var h=0,delta=50;
var rec=function(v){
    for(var i=0;i<v.length;i++){
    store[store.length]=v[i]-sum.length?sum[sum.length-1]:0;
    sum[sum.length]=v[i];
        score[score.length]=score[score.length-1]-1;
    }
};
var rect=function(vn,val,score){
    var node=document.getElementById("graph");
    var n=document.createElement("div");
    n.className="rect";
    n.style.width=(val-vn)/10;
    n.style.top=h;
    n.style.borderRightWidth=vn/10;
    var b=document.createElement("p");
    b.innerText=score+'/'+val;
    b.style.top=h;
    h+=delta;
    b.className="val";
    node.appendChild(n);
    node.appendChild(b);
};
var render=function(){
    for(var i=0;i<sum.length;i++){
        rect(store[i],sum[i],score[i]);
    }
};
var smaller=function(){
    document.getElementById("graph").style.transform="scale(0.3)";
}

</html>
