<html>
<head>
    <title>昨日青空：印刻流年</title>
    <script>
        document.zzzinit=function () {
            zzz.fetch.js("../main/zdata.js");
            setTimeout(init_next,1000);
        };
        var formatit=function (i) {
            i=i.toString();
            var text="";
            for(let j=i.length;j<2;j++) text+="0";
            return text+i;
        };
        var init_next=function () {
            var page=zzz.path.split(zzz.browser.uri).component.pn;
            if(!page) page="1";
            else page=zzz.toNum(page);
            //len is the length of pictures
            var len=[10,6,6,6,9,9,7,7,9,14,11,10,6,6,10,4,4,4,5,4,4,3,4,6,3,4,10,10,16,15,19,8];
            if(page<1||page>len.length){
                document.body.innerHTML+="<p>一共1-"+len.length+"页，请输入正确页数</p>";
                return;
            }
            var parent=document.body;
            var text="";
            for(let i=0;i<len[page-1];i++){
                text+="<img class='comic' src='../open_file/ykln/"+page+"/"+formatit(i)+".jpg"+"' loading='lazy' />";
            }
            parent.innerHTML+=text;
        }
    </script>
</head>
<body>
<style>
    .comic{
        display: block;
        width:100%;
        position: relative;
        margin: 0;
        padding: 0;
        border: 0;
    }
</style>
<p id="hidden">《昨日青空:印刻流年》的漫画，请修改网址阅读，网址为https://zzzzzzzskyward.github.io/ykln/?pn=1。最近更新时间：2021年4月</p>
<script src="../main/zzz.js"></script>
<script src="../main/zdata.js"></script>
</body>
</html>
