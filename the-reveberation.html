const essay={
    title:"The Reveberation",
    author:"ZzzzzzzStargazer",
    content:function(){//接下来是段落
        title("【壹】揭开谜底");
        paragraph("");
		quote("但是我仍未意识到他们的墙是用多么薄的脆饼糊的。直到那天晚上。那天晚上我爱得太响。邻屋传来富有男子气概的咳嗽声，充塞了间隙。那声音想必和我发出的一样清晰。第二天早上，我在奶品店吃早饭（Lolita习惯晚起，我也愿意给她捎一壶热咖啡在床上喝），我昨晚的邻居，...我滑下凳子，一本正经地答道：谢天谢地我是个鳏夫。");
		quote("整场经历是多么甜蜜：咖啡拿来，但是偏不给她，直到她完成了早晨应尽的义务。我是如此体贴的朋友，如此饥渴的父亲，如此优秀的儿科医生，是以能够照料我黑发小姑娘赤褐色身体的一切需求！我对大自然的唯一不满之处在于我没法把Lolita从里翻到外，从而让我的嘴唇如饥似渴地把她年轻的子宫、她未解的心脏、她珍珠母制成的肝、她肺里的海葡萄和她那对标致的肾贴个遍。");
		title("【叁】一些注释");
		paragraph("虽然本文并不意在注释，但是考虑到我们读者（比如我）读西方作品，如果对其文化知之甚少，确实难以get到一些梗，也就损了几番乐趣。我看到的现存的注释（包括<i>The Annotated Lolita</i>，豆瓣的纳博科夫读书小组，知乎的几篇文等）是不足以让人理解全文的，总有一些地方，可能只有纳博科夫自己懂了。这里举个栗子（来自知友回答）：");
		quote("(Valeria被H.H.嫌弃)Her only asset was a muted nature which did help to produce an odd sense of comfort in our small squalid flat:two rooms, a hazy tub, within which I felt like Marat but with no white-necked maiden to stab me.");
		paragraph("诸看官瞧瞧这个"+footnote("Marat","<p>原来是油画《马拉之死》</p><img src='http://p3.pstatp.com/large/31fc0003ad0369cb6296'/>")+"何许人也？竟有粉颈少女前来刺杀。");
		title("【肆】老纳");
		paragraph("对原文中第二部分第二十六章摘抄的一份注解：");
		quote("<p style='text-indent:0;text-align:center;width=100%'>The Enchanted Hunters<br/>NEAR CHURCH<br/>NO DOGS<br/>All legal beverage</p>");
		paragraph("这是四五十年代美国小旅馆里风行的标准。“教堂边上”意味着不接纳异教徒——犹太人"+alias("gentile")+"。大意就是“犹太人与狗不得入内”。");
		quote("纳博科夫记得几年前他去了一家新英格兰的小酒店，同行的有他儿子和儿子的朋友。打开菜单时纳博科夫注意到了一行简短的规定：“仅限非犹太人”。他叫来服务员问她，如果此时此刻门口来了一个满脸胡须、身着礼袍的男人，如果他牵了一头骡子，骡子上骑着他怀孕的妻子，如果他们风尘仆仆，鞍马劳顿，那么店长会怎么做。“你说的是什…什么？”女服务员结结巴巴地问道。“我说的是耶稣基督！”纳博科夫指着那句话朗声质问，从桌旁站了起来，带着一伙人离开了饭店。");
		paragraph("《巴黎评论》：是他编造的[说出评论家的名字]。还有一位评论家说你“贬低”你自己笔下的人物，“将他们变成一部宇宙闹剧中的无足轻重的小人物”。我不同意；亨伯特尽管可笑，还是存有一种有持久力的感人的特质：一个被宠坏的艺术家的特质。");
	paragraph("纳博科夫：我宁愿这样说：亨伯特•亨伯特是一个虚荣、残忍的坏蛋，却让自己看上去很“感人”。“感人”这一述语在其真实的、泪如彩铱的意义上来说，只适用于我笔下那个可怜的小女孩。再说了，我怎么可能将我自己创作的人物“贬低”成无足轻重的小人物云云呢？你可以“贬低”一个传记人物，但不可能贬低一个幻想出来的人物。");
	paragraph("《巴黎评论》：那么编辑的作用呢？确有编辑提出过文学方面的建议吗？");
	paragraph("纳博科夫：我想你所谓的“编辑”就是校对员吧。我认识的校对员里倒颇有一些地道的，无比机敏、和善，他们跟我讨论一个分号的劲儿仿佛这个符号事关荣誉，当然，艺术的符号往往的确如此。<b>不过我也碰到过一些自以为是的、一副老大哥样的混蛋，他们会试图“提意见”，对此我只大吼一声：“不删！”</b>");
	paragraph("《巴黎评论》：你未来有什么工作计划？");
	paragraph("纳博科夫：我正在写一部新的小说，但是无可奉告。另一个我已经筹划了一段时间的项目是出版我为库布里克写的《洛丽塔》的完整剧本。他的电影从剧本中借用的部分刚好还能让我保持剧本作者的合法身份，尽管如此，电影本身只是我想象中的那部精彩作品的模糊寒碜的一瞥，我在洛杉矶的别墅里工作了六个月，一幕一幕地写下来。我不是要暗示库布里克的电影很平庸；就它自身而言，它是一部一流的影片，只不过跟我写的不一样。电影以其歪曲的镜头使小说变形、变粗糙，总会让小说带上一点poshlost的痕迹。我觉得库布里克在他的作品中避免了这一错误，但是我永远不会明白为什么他没有追随我的指导、我的梦。太遗憾了；不过至少我可以让人们阅读我的《洛丽塔》剧本的原稿。");
	comment("“抽动的小腿胫骨”“把她一寸寸从里反过来”，忘了具体在哪一章，看到这两句时，真正了解纳博科夫是伟大的作家。\n他写出了原欲。");
	comment("与其做道德批评，不如去安慰海边那个失落的男孩，他的王国刚刚陷落。");
	comment("纳博科夫在另外一本小说里说，亨伯特这个人死后将被打入地狱，但每年一次，日落时分他有权升入天堂，一个人在夕阳中静静漫步。纳博科夫的意思大约是，亨伯特是个恶人，狼狈地挣扎于自己的欲念之中，多愁善感又气急败坏，可他的那份爱毕竟是真挚的。他伤害了小姑娘和房东太太，也伤害了自己。他念念不忘地是幼时的海边王国，男孩与女孩扮作国王与王后，相爱又被迫分离。这是纠缠他一生的幻念。");
